<!DOCTYPE html>
<html lang="en">
<head>
<title>User Information</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
}

.container{
width:400px;
padding:40px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:30px;
box-shadow:0 20px 30px rgba(0,0,1,.6);
color:white;
text-align:center;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border:grey;
border-radius:10px;
outline:wheat;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0284c7;
color: rgba(0,0,1,.6);
}
</style>
</head>
<body>

<div class="container">
<h1>Welcome</h1>

<input type="text" id="name" placeholder="Enter Your Name">

<input type="date" id="dob">

<button onclick="submitData()">Continue</button>
</div>

<script>
function submitData(){

let name = document.getElementById("name").value;
let dob = document.getElementById("dob").value;

if(name === "" || dob === ""){
alert("Please fill all fields");
return;
}

localStorage.setItem("userName",name);
localStorage.setItem("userDob",dob);

window.location.href="result.html";
}
</script>

</body>
</html>
